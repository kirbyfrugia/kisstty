FEATURES {
    STARTADDRESS: default = $4000;
}
SYMBOLS {
    __STARTADDRESS__: type = export, value = %S;
    wozmon_splash: type = weak, value = $0400;
    wozmon_main: type = weak, value = $9800;
}
MEMORY {
    ZP:             file = "", define = yes, start = $0082, size = $007E;
    MAIN:           file = %O, define = yes, start = %S,    size = $9800 - %S;
    WOZMON_SPLASH:  file = %O, define = yes, start = $0400, size = $00B0;
    WOZMON_SPLASH2: file = %O, define = yes, start = $04B0, size = $009f;
    WOZMON_RAM:     file = %O, define = yes, start = $9800, size = $0800;
}
FILES {
    %O: format = atari;
}
FORMATS {
    atari: runad = wozmon_splash;
}
SEGMENTS {
    ZEROPAGE:       load = ZP,             type = zp,  optional = yes;
    EXTZP:          load = ZP,             type = zp,  optional = yes;
    CODE:           load = MAIN,           type = rw,              define = yes;
    RODATA:         load = MAIN,           type = ro,  optional = yes;
    DATA:           load = MAIN,           type = rw,  optional = yes;
    INIT:           load = MAIN,           type = bss, optional = yes, define = yes;
    BSS:            load = MAIN,           type = bss, optional = yes, define = yes;
    WOZMON_SPLASH:  load = WOZMON_SPLASH,  type = rw,  optional = yes;
    WOZMON_SPLASH2: load = WOZMON_SPLASH2, type = rw,  optional = yes;
    WOZMON_CODE:    load = WOZMON_RAM,     type = rw,  optional = yes;
}
